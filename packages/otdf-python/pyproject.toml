[project]
name = "otdf-python"
version = "0.7.3"
description = "Unofficial OpenTDF SDK for Python"
readme = "README.md"
authors = [
    { name = "b-long", email = "b-long@users.noreply.github.com" }
]
requires-python = ">=3.10"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: 3 :: Only",
    "Topic :: Security :: Cryptography",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]

dependencies = [
    "cryptography>=45.0.4",
    "connect-python>=0.9.0",
    "httpx2>=2.3.0",
    "protobuf>=6.31.1",
    "pyjwt>=2.10.1",
    "typing-extensions>=4.14.1",
    # Legacy gRPC support (may be removed in future versions)
    "grpcio>=1.74.0",
    "grpcio-status>=1.74.0",
]

[project.urls]
Homepage = "https://github.com/b-long/opentdf-python-sdk"
Repository = "https://github.com/b-long/opentdf-python-sdk"
Issues = "https://github.com/b-long/opentdf-python-sdk/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/otdf_python"]

[tool.hatch.build.targets.wheel.force-include]
"../otdf-python-proto/src/otdf_python_proto" = "otdf_python_proto"

[dependency-groups]
dev = [
    "pydantic-settings>=2.10.1",
    "pytest>=8.4.1",
    "ruff>=0.12.10",
    "tomli>=2.2.1 ; python_version < '3.11'",
    "protoc-gen-connect-python>=0.6.0,<0.7",
    "grpcio-tools>=1.74.0",
    "protoc-gen-openapiv2>=0.0.1",
]
