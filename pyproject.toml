[tool.uv]
package = false

[tool.uv.workspace]
members = ["packages/otdf-python", "packages/otdf-python-proto"]

[tool.pytest.ini_options]
markers = [
    "integration: mark a test as an integration test."
]
testpaths = ["tests"]
norecursedirs = ["packages/otdf-python-proto"]

[tool.ruff]
line-length = 88
target-version = "py310"

# See https://docs.astral.sh/ruff/rules/
# for rule information.
#  E501: Line too long (black enforces this for us)
lint.ignore = [
    "E501",
]
lint.select = [
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "C90",    # McCabe complexity
    "D",      # pydocstyle
    "DOC",    # pydoclint
    "E",      # pycodestyle errors
    "F",      # pyflakes
    "FURB",   # refurb
    "I",      # isort
    "PERF",   # performance
    "PIE",    # flake8-pie
    "PT018",  # pytest style
    "PTH",    # pathlib
    "Q",      # flake8-quotes
    "RUF",    # ruff-specific
    "SIM",    # flake8-simplify
    "UP",     # pyupgrade
    "W",      # pycodestyle warnings
]
# Ignore generated files
extend-exclude = ["packages/otdf-python-proto/src/"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["D100", "D101", "D102", "D103", "D107", "D400", "D401", "D415"]
"packages/otdf-python-proto/**" = ["D"]  # Ignore all D (docstring) rules for generated proto files

# TODO: Remaining work - 4 buckets to fix (140 errors remaining):
# Bucket #1: D102 (missing method docstrings) - 98 errors
# Bucket #2: D105 (missing magic method docstrings) - 23 errors
"packages/otdf-python/src/**" = ["D102", "D105"]
