name: Lint PR Title

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Types must match changelog-sections in .release-please-config.json
          types: |
            feat
            fix
            perf
            revert
            docs
            refactor
            build
            style
            chore
            test
            ci
          requireScope: false
